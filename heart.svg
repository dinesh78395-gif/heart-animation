<?xml version="1.0" encoding="UTF-8"?>
<!--
  heart.svg
  A single small red heart shape, drawn as a pure SVG path (no emoji, no image).
  script.js keeps an identical <symbol> defined inline (see #heart-symbol in
  index.html) so it can clone hundreds of lightweight <use> particles at
  runtime via document.createElementNS instead of re-fetching this file.
-->
<svg viewBox="0 0 32 29" xmlns="http://www.w3.org/2000/svg">
  <path d="M16 28
           C 16 28, 1 18.5, 1 9.2
           C 1 3.5, 5.4 0, 10 0
           C 13 0, 15 1.6, 16 4
           C 17 1.6, 19 0, 22 0
           C 26.6 0, 31 3.5, 31 9.2
           C 31 18.5, 16 28, 16 28 Z"
        fill="#ff4d6d"/>
</svg>
